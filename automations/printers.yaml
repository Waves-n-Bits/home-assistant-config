- id: '1721495372161'
  alias: Lifecycle Print Progress
  triggers:
  - entity_id:
    - sensor.kiwi_current_layer
    - sensor.papaya_current_layer
    - sensor.mango_current_layer
    - sensor.strawberry_current_layer
    - sensor.huckleberry_current_layer
    - sensor.pineapple_current_layer
    for:
      seconds: 1
    to:
    - '2'
    trigger: state
  - entity_id:
    - sensor.kiwi_current_layer
    - sensor.papaya_current_layer
    - sensor.mango_current_layer
    - sensor.strawberry_current_layer
    - sensor.huckleberry_current_layer
    - sensor.pineapple_current_layer
    for:
      seconds: 1
    to:
    - '10'
    trigger: state
  - entity_id:
    - sensor.kiwi_print_progress
    - sensor.papaya_print_progress
    - sensor.mango_print_progress
    - sensor.strawberry_print_progress
    - sensor.huckleberry_print_progress
    - sensor.pineapple_print_progress
    for:
      seconds: 1
    to:
    - '50'
    trigger: state
  - entity_id:
    - sensor.kiwi_print_progress
    - sensor.papaya_print_progress
    - sensor.mango_print_progress
    - sensor.strawberry_print_progress
    - sensor.huckleberry_print_progress
    - sensor.pineapple_print_progress
    for:
      seconds: 1
    to:
    - '90'
    trigger: state
  actions:
  - variables:
      printer: '{{trigger.entity_id.split(''_'')[0].split(''.'')[1]}}'
      display_name: '{{states("sensor."+printer+"_display_name") }}'
      object_name: '{{states("sensor."+printer+"_object") }}'
      end_dt: '{% set e = as_datetime(states("sensor."+printer+"_end_time"), none)
        %}{% if e %}{{ e }}{% else %}{% set s = states("sensor."+printer+"_print_time_left")|int(0)
        %}{% if s > 0 %}{{ now() + timedelta(seconds=s) }}{% endif %}{% endif %}'
      thread_ts: '{{ states("input_text."+printer+"_slack_thread_ts") }}'
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ '.' in thread_ts }}"
      sequence:
      - data:
          target: "#3dprint-info"
          message: ":speech_balloon: {{ states('sensor.'+printer+'_print_progress', with_unit=True)
            }}{% if end_dt %} | {% set secs = (as_timestamp(end_dt) - as_timestamp(now()))
            | int(0) %}{% set h = secs // 3600 %}{% set m = (secs % 3600) // 60 %}{{ h
            }}h {{ '%02d' | format(m) }}m (ends {{ as_timestamp(end_dt) | timestamp_custom('%I:%M
            %p') }}){% endif %} — {% if display_name != object_name %}@{{display_name}},
            {% endif %}{{object_name}} {% set prog = states('sensor.'+printer+'_print_progress')
            | int(0) %}{% if prog >= 90 %}almost done!{% elif prog >= 50 %}halfway there!{%
            else %}printing away!{% endif %} {{states('input_text.'+printer+'_stream')}}"
          data:
            username: '{{ printer | capitalize }}'
            icon: '{{ ''kiwifruit'' if printer == ''kiwi'' else printer }}'
            thread_ts: '{{ thread_ts }}'
        action: notify.make_nashville
    default:
    - data:
        target: "#3dprint-info"
        message: ":speech_balloon: {{ states('sensor.'+printer+'_print_progress', with_unit=True)
          }}{% if end_dt %} | {% set secs = (as_timestamp(end_dt) - as_timestamp(now()))
          | int(0) %}{% set h = secs // 3600 %}{% set m = (secs % 3600) // 60 %}{{ h
          }}h {{ '%02d' | format(m) }}m (ends {{ as_timestamp(end_dt) | timestamp_custom('%I:%M
          %p') }}){% endif %} — {% if display_name != object_name %}@{{display_name}},
          {% endif %}{{object_name}} {% set prog = states('sensor.'+printer+'_print_progress')
          | int(0) %}{% if prog >= 90 %}almost done!{% elif prog >= 50 %}halfway there!{%
          else %}printing away!{% endif %} {{states('input_text.'+printer+'_stream')}}"
        data:
          username: '{{ printer | capitalize }}'
          icon: '{{ ''kiwifruit'' if printer == ''kiwi'' else printer }}'
      action: notify.make_nashville
  mode: single
- id: '1722144402850'
  alias: Lifecycle Print Starting
  triggers:
  - entity_id: &bambu_lab_printers
    - sensor.mango_print_status
    - sensor.kiwi_print_status
    - sensor.strawberry_print_status
    - sensor.papaya_print_status
    - sensor.huckleberry_print_status
    to:
    - running
    for:
      seconds: 10
    trigger: state
    from:
    - prepare
  - entity_id:
    - sensor.pineapple_print_status
    to:
    - printing
    from:
    - idle
    for:
      seconds: 10
    trigger: state
  actions:
  - variables:
      printer: '{{trigger.entity_id.split(''_'')[0].split(''.'')[1]}}'
      display_name: '{{states("sensor."+printer+"_display_name")}}'
      object_name: '{{states("sensor."+printer+"_object") }}'
      end_dt: '{% set e = as_datetime(states("sensor."+printer+"_end_time"), none)
        %}{% if e %}{{ e }}{% else %}{% set s = states("sensor."+printer+"_print_time_left")|int(0)
        %}{% if s > 0 %}{{ now() + timedelta(seconds=s) }}{% endif %}{% endif %}'
      print_weight: '{{states("sensor."+printer+"_print_weight", with_unit=True) if
        states("sensor."+printer+"_print_weight") not in ["unknown","unavailable",""]
        else ""}}'
      total_layers: '{{states("sensor."+printer+"_total_layer_count") if states("sensor."+printer+"_total_layer_count")
        not in ["unknown","unavailable",""] else states("sensor."+printer+"_total_layers")
        if states("sensor."+printer+"_total_layers") not in ["unknown","unavailable",""]
        else ""}}'
      bed_type: '{{states("sensor."+printer+"_print_bed_type") if states("sensor."+printer+"_print_bed_type")
        not in ["unknown","unavailable",""] else ""}}'
  - variables:
      msg: ":printer: {% if print_weight %}{{print_weight}}{% endif %}{% if total_layers
        %}{% if print_weight %} | {% endif %}{{total_layers}} layers{% endif %}{% if
        end_dt %}{% if print_weight or total_layers %} | {% endif %}{% set secs = (as_timestamp(end_dt)
        - as_timestamp(now())) | int(0) %}{% set h = secs // 3600 %}{% set m = (secs
        % 3600) // 60 %}{{ h }}h {{ '%02d' | format(m) }}m (ends {{ as_timestamp(end_dt)
        | timestamp_custom('%I:%M %p') }}){% endif %}{% if print_weight or total_layers
        or end_dt %} — {% endif %}{% if display_name != object_name %}@{{display_name}},
        {% endif %}{{object_name}} is underway!{% if bed_type %} on a {{bed_type}}{%
        endif %}. {{states('input_text.'+printer+'_stream')}}"
  - action: rest_command.slack_post_3dprint
    data:
      channel: "#3dprint-info"
      text: "{{ msg }}"
      username: "{{ printer | capitalize }}"
      icon_emoji: ":{{ 'kiwifruit' if printer == 'kiwi' else printer }}:"
    response_variable: slack_response
  - action: input_text.set_value
    target:
      entity_id: "input_text.{{ printer }}_slack_thread_ts"
    data:
      value: "{% set ts = (slack_response.content | from_json).ts | default('') | string %}{{ ts if '.' in ts else '' }}"
  - if:
    - condition: template
      value_template: "{{ printer == 'pineapple' }}"
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.pineapple_last_job
      data:
        value: "{{ states('sensor.pineapple_current_object') }}"
  mode: parallel
  max: 4
- id: '1722191155564'
  alias: Lifecycle Print Finished
  triggers:
  - entity_id: *bambu_lab_printers
    to:
    - finish
    for:
      seconds: 5
    trigger: state
    from:
    - running
  - entity_id:
    - sensor.pineapple_print_status
    to:
    - completed
    for:
      seconds: 5
    trigger: state
    from:
    - printing
  actions:
  - variables:
      printer: '{{trigger.entity_id.split(''_'')[0].split(''.'')[1]}}'
      display_name: '{{states("sensor."+printer+"_last_display_name") }}'
      object_name: '{{states("sensor."+printer+"_last_object") }}'
      job_secs: '{{states("sensor."+printer+"_print_job_time") | int(0)}}'
      job_time_str: '{%- set h = (job_secs // 3600) | int %}{%- set m = ((job_secs
        % 3600) // 60) | int %}{{ h }}h {{ "%02d" | format(m) }}m'
      used_weight: '{{states("sensor."+printer+"_used_material_weight", with_unit=True)
        if states("sensor."+printer+"_used_material_weight") not in ["unknown","unavailable"]
        else ""}}'
      thread_ts: '{{ states("input_text."+printer+"_slack_thread_ts") }}'
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ '.' in thread_ts }}"
      sequence:
      - data:
          target: "#3dprint-info"
          message: ":white_check_mark: {{job_time_str}}{% if used_weight %} | {{used_weight}}{% endif
            %} — {% if display_name != object_name %}@{{display_name}}, {% endif %}{{object_name}}
            is done! Come grab it and clear the plate for the next maker. {{states('input_text.'+printer+'_stream')}}"
          data:
            username: '{{ printer | capitalize }}'
            icon: '{{ ''kiwifruit'' if printer == ''kiwi'' else printer }}'
            thread_ts: '{{ thread_ts }}'
        action: notify.make_nashville
    default:
    - data:
        target: "#3dprint-info"
        message: ":white_check_mark: {{job_time_str}}{% if used_weight %} | {{used_weight}}{% endif
          %} — {% if display_name != object_name %}@{{display_name}}, {% endif %}{{object_name}}
          is done! Come grab it and clear the plate for the next maker. {{states('input_text.'+printer+'_stream')}}"
        data:
          username: '{{ printer | capitalize }}'
          icon: '{{ ''kiwifruit'' if printer == ''kiwi'' else printer }}'
      action: notify.make_nashville
  - action: input_text.set_value
    target:
      entity_id: "input_text.{{ printer }}_slack_thread_ts"
    data:
      value: ""
  mode: parallel
  max: 4

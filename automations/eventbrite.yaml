- id: 'eventbrite_new_event'
  alias: Eventbrite New Event Published
  triggers:
    - trigger: webhook
      webhook_id: !secret eventbrite_webhook_id
      allowed_methods:
        - POST
      local_only: false
  conditions:
    - condition: template
      value_template: >
        {{ trigger.json.config.action == 'event.published' }}
  actions:
    - variables:
        api_url: "{{ trigger.json.api_url }}"
    - action: rest_command.eventbrite_get_event
      data:
        url: "{{ api_url }}"
      response_variable: event_response
    - variables:
        event: "{{ event_response.content | from_json }}"
    - variables:
        event_name: "{{ event.name.text }}"
        event_date: "{{ event.start.local | as_datetime | timestamp_custom('%A, %B %-d at %-I:%M %p') }}"
        event_desc: "{{ event.description.text[:200] }}..."
        event_url: "{{ event.url }}"
        ticket_info: >-
          {% set tickets = [] %}
          {% for t in event.ticket_classes | default([]) %}
            {% if t.cost %}
              {% set tickets = tickets + [t.cost.display] %}
            {% else %}
              {% set tickets = tickets + ['Free'] %}
            {% endif %}
          {% endfor %}
          {{ tickets | join(', ') if tickets else 'Free' }}
    - action: notify.make_nashville
      data:
        target: "#integrations_sandbox"
        message: >-
          :calendar: *New Event Published*
          *{{ event_name }}*
          :clock1: {{ event_date }}
          :ticket: {{ ticket_info }}
          :memo: {{ event_desc }}
          :link: {{ event_url }}
        data:
          username: Eventbrite
          icon: calendar
  mode: single

- id: 'eventbrite_daily_signup_digest'
  alias: Eventbrite Daily Signup Digest
  triggers:
    - trigger: time
      at: '09:00:00'
  conditions:
    - condition: template
      value_template: >
        {{ states('sensor.eventbrite_daily_signups') | int(0) > 0
           and state_attr('sensor.eventbrite_daily_signups', 'attendees') is not none }}
  actions:
    - variables:
        attendees: "{{ state_attr('sensor.eventbrite_daily_signups', 'attendees') }}"
        count: "{{ states('sensor.eventbrite_daily_signups') | int(0) }}"
    - variables:
        event_lines: |-
          {% set ns = namespace(events={}) %}
          {% for a in attendees %}
            {% set ename = a.event.name.text %}
            {% set names = ns.events.get(ename, []) + [a.profile.name] %}
            {% set ns.events = dict(ns.events, **{ename: names}) %}
          {% endfor %}
          {% for event, names in ns.events.items() %}
            {%- set ns2 = namespace(counts={}) -%}
            {%- for n in names -%}
              {%- set ns2.counts = dict(ns2.counts, **{n: ns2.counts.get(n, 0) + 1}) -%}
            {%- endfor -%}
            {%- set display = [] -%}
            {%- for name, c in ns2.counts.items() -%}
              {%- if c > 1 -%}
                {%- set display = display + [name ~ ' (' ~ c ~ ')'] -%}
              {%- else -%}
                {%- set display = display + [name] -%}
              {%- endif -%}
            {%- endfor %}
          *{{ event }}* — {{ display | join(', ') }}
          {% endfor %}
    - action: notify.make_nashville
      data:
        target: "#integrations_sandbox"
        message: |-
          :wave: *Eventbrite Signups — Last 24 Hours* ({{ count }} new)
          {{ event_lines }}
        data:
          username: Eventbrite
          icon: calendar
  mode: single

- id: 'eventbrite_event_day_alert'
  alias: Eventbrite Event Day Alert
  triggers:
    - trigger: time
      at: '08:00:00'
  conditions:
    - condition: template
      value_template: >
        {{ states('sensor.eventbrite_today_events') | int(0) > 0
           and state_attr('sensor.eventbrite_today_events', 'events') is not none }}
  actions:
    - variables:
        events: "{{ state_attr('sensor.eventbrite_today_events', 'events') }}"
    - variables:
        event_lines: |-
          {% for event in events %}
          {% set signups = event.ticket_classes | default([]) | map(attribute='quantity_sold') | map('int', default=0) | sum %}
          *{{ event.name.text }}*
          :clock1: {{ event.start.local | as_datetime | timestamp_custom('%-I:%M %p') }}
          :busts_in_silhouette: {{ signups }} signup{{ 's' if signups != 1 }}
          :link: {{ event.url }}
          {% endfor %}
    - action: notify.make_nashville
      data:
        target: "#integrations_sandbox"
        message: |-
          :mega: *Events Today*
          {{ event_lines }}
        data:
          username: Eventbrite
          icon: calendar
  mode: single

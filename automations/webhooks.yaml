- id: '1767137243013'
  alias: Stripe – 3D Print Filament Purchase
  triggers:
  - webhook_id: !secret stripe_webhook_id
    trigger: webhook
    allowed_methods:
    - POST
    local_only: false
  conditions:
  - condition: template
    value_template: >
      {% set obj = trigger.json.data.object | default({}) %}
      {% set desc = obj.description | default('') | replace('\u2013', '-') | replace('\u2014', '-') %}
      {{ trigger.json.livemode | default(false)
         and '3D Print Filament' in desc
         and 'Self Service' in desc }}
  actions:
  - action: light.turn_on
    target:
      entity_id: light.filament_store_light
    data:
      rgb_color:
      - 11
      - 199
      - 0
      brightness_pct: 100
  - delay:
      seconds: 30
  - action: light.turn_on
    target:
      entity_id: light.filament_store_light
    data:
      rgb_color:
      - 255
      - 158
      - 0
      brightness_pct: 10
      transition: 32
  mode: single
- id: '1740400000000'
  alias: Gadget AI Failure Detection
  description: Receives OctoEverywhere Gadget webhooks for Bambu Lab printers
  triggers:
  - trigger: webhook
    webhook_id: !secret octoeverywhere_webhook_id
    allowed_methods:
    - POST
    local_only: false
  conditions:
  - condition: template
    value_template: >
      {{ trigger.json.EventType in [7, 8]
         and trigger.json.PrinterName is defined
         and trigger.json.PrinterName | lower in ['kiwi', 'mango', 'papaya', 'strawberry', 'huckleberry'] }}
  actions:
  - variables:
      event_type: '{{ trigger.json.EventType }}'
      printer_name: '{{ trigger.json.PrinterName }}'
      printer_id: '{{ trigger.json.PrinterName | lower }}'
      file_name: '{{ trigger.json.FileName | default("") }}'
      progress: '{{ trigger.json.Progress | default(0) }}'
      stream_url: '{{ states("input_text." + printer_id + "_stream") }}'
      thread_ts: '{{ states("input_text." + printer_id + "_slack_thread_ts") }}'
  - variables:
      gadget_msg: '{{ progress }}% — {% if event_type == 8 %}:rotating_light: Gadget paused
        {{ printer_name }} after detecting a failure{% else %}:warning: Gadget detected
        a possible failure on {{ printer_name }}{% endif %}{% if file_name %} printing
        {{ file_name }}{% endif %}. {{ stream_url }}'
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ '.' in thread_ts }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#3dprint-info"
          message: "{{ gadget_msg }}"
          data:
            username: Gadget
            icon: robot_face
            thread_ts: '{{ thread_ts }}'
            blocks:
            - type: section
              text:
                type: mrkdwn
                text: "{{ gadget_msg }}"
            - type: actions
              elements:
              - type: button
                text:
                  type: plain_text
                  text: "Cancel Print"
                style: danger
                action_id: cancel_bambu_print
                value: "{{ printer_id }}"
                confirm:
                  title:
                    type: plain_text
                    text: "Cancel Print?"
                  text:
                    type: mrkdwn
                    text: "This will stop the current print. Are you sure?"
                  confirm:
                    type: plain_text
                    text: "Yes, cancel it"
                  deny:
                    type: plain_text
                    text: "Never mind"
    default:
    - action: notify.make_nashville
      data:
        target: "#3dprint-info"
        message: "{{ gadget_msg }}"
        data:
          username: Gadget
          icon: robot_face
          blocks:
          - type: section
            text:
              type: mrkdwn
              text: "{{ gadget_msg }}"
          - type: actions
            elements:
            - type: button
              text:
                type: plain_text
                text: "Cancel Print"
              style: danger
              action_id: cancel_bambu_print
              value: "{{ printer_id }}"
              confirm:
                title:
                  type: plain_text
                  text: "Cancel Print?"
                text:
                  type: mrkdwn
                  text: "This will stop the current print. Are you sure?"
                confirm:
                  type: plain_text
                  text: "Yes, cancel it"
                deny:
                  type: plain_text
                  text: "Never mind"
  mode: parallel
  max: 5
- id: slack_cancel_bambu_print
  alias: Slack – Cancel Bambu Print
  description: Handles Slack interactive button clicks to cancel a Bambu Lab print
  triggers:
  - trigger: webhook
    webhook_id: !secret slack_cancel_print_webhook_id
    allowed_methods:
    - POST
    local_only: false
  conditions:
  - condition: template
    value_template: >
      {% set payload = trigger.data.get('payload', '{}') | from_json %}
      {% set action = (payload.get('actions', [{}])[0]) %}
      {{ action.get('action_id', '') == 'cancel_bambu_print'
         and action.get('value', '') in ['kiwi','mango','papaya','strawberry','huckleberry'] }}
  actions:
  - variables:
      payload: "{{ trigger.data.get('payload', '{}') | from_json }}"
      printer: "{{ payload.actions[0].value }}"
      response_url: "{{ payload.response_url }}"
      slack_user: "{{ payload.user.name | default('Someone') }}"
  - action: button.press
    target:
      entity_id: "button.{{ printer }}_stop_printing"
  - action: rest_command.slack_respond
    data:
      response_url: "{{ response_url }}"
      text: ":octagonal_sign: {{ slack_user }} cancelled the print on {{ printer | capitalize }}."
  mode: parallel
  max: 6

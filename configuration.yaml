    type: count
    start: "{{ now() - timedelta(days=7) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: Pineapple Prints Completed Week
    entity_id: sensor.pineapple_print_status
    state: "completed"
    type: count
    start: "{{ now() - timedelta(days=7) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: Pineapple Prints Failed Week
    entity_id: sensor.pineapple_print_status
    state: "stopped"
    type: count
    start: "{{ now() - timedelta(days=7) }}"
    end: "{{ now() }}"

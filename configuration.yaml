# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include_dir_merge_list automations
script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  allowlist_external_dirs:
    - "/config/www/snapshots"

lovelace:
  dashboards:
    air-quality:
      mode: yaml
      title: Air Quality
      icon: mdi:air-filter
      filename: dashboards/air_quality.yaml
      show_in_sidebar: true
      require_admin: false
    facilities-overview:
      mode: yaml
      title: Facilities
      icon: mdi:office-building-cog
      filename: dashboards/facilities.yaml
      show_in_sidebar: true
      require_admin: false

shell_command:
  git_pull: "git -C /config pull --rebase origin main"
  write_entity_list: "bash /config/write_entity_list.sh"

rest_command:
  slack_post_3dprint:
    url: https://slack.com/api/chat.postMessage
    method: POST
    headers:
      Authorization: !secret slack_bot_token_header
      Content-Type: "application/json; charset=utf-8"
    payload: >-
      {"channel": {{ channel | tojson }}, "text": {{ text | tojson }},
       "username": {{ username | tojson }}, "icon_emoji": {{ icon_emoji | tojson }}
       {% if blocks is defined and blocks %}, "blocks": {{ blocks }}{% endif %}}
  slack_respond:
    url: "{{ response_url }}"
    method: POST
    headers:
      Content-Type: "application/json; charset=utf-8"
    payload: >-
      {"replace_original": false, "response_type": "in_channel",
       "text": {{ text | tojson }}}
  slack_auth_test:
    url: https://slack.com/api/auth.test
    method: POST
    headers:
      Authorization: !secret slack_bot_token_header
      Content-Type: "application/json; charset=utf-8"
  eventbrite_get_event:
    url: "{{ url }}"
    method: GET
    headers:
      Authorization: !secret eventbrite_token_header

input_text:
  pineapple_last_job:
    name: Pineapple Last Job
    max: 255
  kiwi_slack_thread_ts:
    name: Kiwi Slack Thread TS
    max: 30
  mango_slack_thread_ts:
    name: Mango Slack Thread TS
    max: 30
  papaya_slack_thread_ts:
    name: Papaya Slack Thread TS
    max: 30
  strawberry_slack_thread_ts:
    name: Strawberry Slack Thread TS
    max: 30
  huckleberry_slack_thread_ts:
    name: Huckleberry Slack Thread TS
    max: 30
  pineapple_slack_thread_ts:
    name: Pineapple Slack Thread TS
    max: 30
  eventbrite_org_id:
    name: Eventbrite Org ID
    max: 30

input_boolean:
  facilities_pulse_verbose:
    name: Facilities Pulse Verbose Mode
    icon: mdi:bell-outline
  deploy_restart_in_progress:
    name: Deploy Restart In Progress
    icon: mdi:restart

recorder:
  purge_keep_days: 14
  exclude:
    domains:
      - camera
      - device_tracker
      - image
      - person
      - weather
    entities:
      - sun.sun
      - binary_sensor.filament_store_light_motion
      - sensor.filament_store_light_illuminance
      - input_boolean.facilities_pulse_verbose
      - sensor.eventbrite_daily_signups
      - sensor.eventbrite_today_events
    entity_globs:
      # Fan speeds / signals (already present)
      - sensor.*_wi_fi_signal
      - sensor.*_fan_speed
      - sensor.*_target_temperature
      - sensor.*_speed_profile
      - sensor.*_current_layer_height
      - sensor.*_ams_tray_*
      # 3D printer real-time sensors
      - sensor.*_bed_temperature
      - sensor.*_position_*
      - sensor.*_ams_*
      - sensor.*_current_layer
      - sensor.*_remaining_time
      - sensor.*_model_download
      - sensor.*_print_progress
      - sensor.*_print_time_left
      - sensor.*_real_time_flow
      - sensor.*_current_object
      # Fans
      - fan.*_fan
      # Distance / proximity sensors
      - sensor.*_estimated_distance*

rest:
  - resource_template: >-
      https://www.eventbriteapi.com/v3/organizations/{{ states('input_text.eventbrite_org_id') }}/attendees/?changed_since={{ (now() - timedelta(days=1)).strftime('%Y-%m-%dT00:00:00Z') }}&expand=event
    headers:
      Authorization: !secret eventbrite_token_header
    scan_interval: 3600
    sensor:
      - name: Eventbrite Daily Signups
        value_template: "{{ (value_json.pagination | default({})).object_count | default(0) }}"
        json_attributes:
          - attendees
  - resource_template: >-
      https://www.eventbriteapi.com/v3/organizations/{{ states('input_text.eventbrite_org_id') }}/events/?start_date.range_start={{ now().strftime('%Y-%m-%dT00:00:00') }}&start_date.range_end={{ now().strftime('%Y-%m-%dT23:59:59') }}&expand=ticket_classes&status=live
    headers:
      Authorization: !secret eventbrite_token_header
    scan_interval: 3600
    sensor:
      - name: Eventbrite Today Events
        value_template: "{{ (value_json.events | default([])) | length }}"
        json_attributes:
          - events
  - resource_template: >-
      https://www.eventbriteapi.com/v3/organizations/{{ states('input_text.eventbrite_org_id') }}/events/?start_date.range_start={{ (now() + timedelta(days=7)).strftime('%Y-%m-%dT00:00:00') }}&start_date.range_end={{ (now() + timedelta(days=7)).strftime('%Y-%m-%dT23:59:59') }}&expand=ticket_classes&status=live
    headers:
      Authorization: !secret eventbrite_token_header
    scan_interval: 3600
    sensor:
      - name: Eventbrite Next Week Events
        value_template: "{{ (value_json.events | default([])) | length }}"
        json_attributes:
          - events

template:
  - sensor:
      - name: "Air Quality Overall Status"
        unique_id: air_quality_overall_status
        availability: >
          {{ states('sensor.air_quality_carbon_dioxide') not in ['unknown', 'unavailable']
             and states('sensor.air_quality_voc_index') not in ['unknown', 'unavailable']
             and states('sensor.air_quality_pm2_5') not in ['unknown', 'unavailable'] }}
        state: >
          {% set co2  = states('sensor.air_quality_carbon_dioxide') | int(0) %}
          {% set voc  = states('sensor.air_quality_voc_index')      | int(0) %}
          {% set nox  = states('sensor.air_quality_nox_index')      | int(0) %}
          {% set pm25 = states('sensor.air_quality_pm2_5')          | float(0) %}
          {% if co2 > 1500 or voc > 300 or nox > 250 or pm25 > 55.4 %}Dangerous
          {% elif co2 > 1200 or voc > 200 or nox > 150 or pm25 > 35.4 %}Poor
          {% elif co2 > 800  or voc > 150 or nox > 50  or pm25 > 12 %}Moderate
          {% else %}Good{% endif %}

      - name: "Kiwi Display Name"
        unique_id: kiwi_display_name
        availability: "{{ states('sensor.kiwi_gcode_filename') not in ['unknown', 'unavailable'] }}"
        state: >
          {{states('sensor.kiwi_gcode_filename').split('-')[0]}}
      - name: "Kiwi Object"
        unique_id: kiwi_object
        availability: "{{ states('sensor.kiwi_display_name') not in ['unknown', 'unavailable'] }}"
        state: >
          {{states('sensor.kiwi_gcode_filename').replace(states('sensor.kiwi_display_name') + '-', '')}}

name: Validate YAML

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML files
        run: |
          python3 - <<'EOF'
          import yaml, sys, glob

          class PassThruLoader(yaml.SafeLoader):
              pass

          for tag in ('!include', '!include_dir_merge_named', '!include_dir_list',
                      '!include_dir_merge_list', '!include_dir_named', '!secret',
                      '!env_var', '!input'):
              PassThruLoader.add_constructor(tag, lambda loader, node: loader.construct_scalar(node))

          files = (
              glob.glob('*.yaml') +
              glob.glob('automations/*.yaml') +
              glob.glob('dashboards/*.yaml') +
              glob.glob('esphome/*.yaml')
          )
          ok = True
          for f in sorted(files):
              try:
                  with open(f) as fh:
                      yaml.load(fh, Loader=PassThruLoader)
                  print(f'OK  {f}')
              except yaml.YAMLError as e:
                  print(f'ERR {f}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF

  check-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI scaffolding
        run: |
          cat > secrets.yaml <<'EOF'
          slack_bot_token_header: "Bearer xoxb-dummy"
          eventbrite_token_header: "Bearer dummy-token"
          eventbrite_webhook_id: "dummy-webhook-id"
          stripe_webhook_id: "dummy-stripe-webhook"
          octoeverywhere_webhook_id: "dummy-octoeverywhere-webhook"
          slack_cancel_print_webhook_id: "dummy-cancel-webhook"
          EOF
          mkdir -p www/snapshots

      - name: Check HA config
        run: |
          output=$(docker run --rm \
            -v "${{ github.workspace }}:/config" \
            homeassistant/home-assistant:stable \
            python -m homeassistant --script check_config -c /config 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE "(Failed config|Incorrect config)"; then
            echo "$output" | sed -n '/\(Failed\|Incorrect\) config/,$ p' | while IFS= read -r line; do
              if echo "$line" | grep -qE '^\s+-\s'; then
                echo "::error::$line"
              fi
            done
            exit 1
          fi

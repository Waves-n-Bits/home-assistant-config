name: Deploy Config to Home Assistant

on:
  push:
    branches: [main]
    paths:
      - automations/**
      - scripts.yaml
      - scenes.yaml
      - configuration.yaml
      - git_backup.sh
      - write_entity_list.sh
      - themes/**
      - dashboards/**
      - esphome/**
      - .github/workflows/deploy.yml

jobs:
  deploy:
    name: Pull, validate, and apply config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if configuration.yaml changed (requires full restart)
        id: restart_check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(configuration\.yaml)'; then
            echo "required=true" >> $GITHUB_OUTPUT
          else
            echo "required=false" >> $GITHUB_OUTPUT
          fi

      - name: Git pull config on HA host
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/shell_command/git_pull"

      - name: Wait 5s for git pull to finish
        run: sleep 5

      - name: Validate HA config via check_config API
        run: |
          result=$(curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/config/core/check_config")
          echo "$result"
          echo "$result" | jq -e '.result == "valid"'

      # --- Restart path ---

      - name: Slack — Notify restart beginning
        if: steps.restart_check.outputs.required == 'true'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          body=$(jq -n \
            --arg msg ":arrows_counterclockwise: Config deployed from GitHub — full restart required for core config changes. Restarting now. <${COMMIT_URL}|${SHORT_SHA}>" \
            --arg target "#deployment-feed" \
            '{"target": $target, "message": $msg, "data": {"username": "GitHub Actions", "icon": "rocket"}}')
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$body" \
            "${{ secrets.HA_URL }}/api/services/notify/make_nashville"

      - name: Flag deploy restart in progress
        if: steps.restart_check.outputs.required == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"entity_id": "input_boolean.deploy_restart_in_progress"}' \
            "${{ secrets.HA_URL }}/api/services/input_boolean/turn_on"

      - name: Trigger HA full restart
        if: steps.restart_check.outputs.required == 'true'
        run: |
          # HA shuts down before it can respond, so curl will always
          # fail with a connection-level error (52, 35, etc.). Fire and
          # forget — config was already validated above.
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/homeassistant/restart" \
            || true

      - name: Poll /api/ until HA is back online (up to 5 min)
        if: steps.restart_check.outputs.required == 'true'
        run: |
          echo "Waiting for HA to come back online..."
          sleep 15
          for i in $(seq 1 30); do
            if curl -f -s -o /dev/null \
              -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
              "${{ secrets.HA_URL }}/api/"; then
              echo "HA is back online after ~$((i * 10 + 15)) seconds"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "HA did not come back within 5 minutes"
          exit 1

      - name: Slack — Restart complete
        if: steps.restart_check.outputs.required == 'true'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          body=$(jq -n \
            --arg msg ":white_check_mark: Config deployed from GitHub — full restart complete. <${COMMIT_URL}|${SHORT_SHA}>" \
            --arg target "#deployment-feed" \
            '{"target": $target, "message": $msg, "data": {"username": "GitHub Actions", "icon": "rocket"}}')
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$body" \
            "${{ secrets.HA_URL }}/api/services/notify/make_nashville"

      # --- Reload path ---

      - name: Hot-reload automations
        if: steps.restart_check.outputs.required == 'false'
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/automation/reload"

      - name: Hot-reload scripts
        if: steps.restart_check.outputs.required == 'false'
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/script/reload"

      - name: Hot-reload scenes
        if: steps.restart_check.outputs.required == 'false'
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/scene/reload"

      - name: Hot-reload themes
        if: steps.restart_check.outputs.required == 'false'
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/frontend/reload_themes"

      - name: Hot-reload core config and templates
        if: steps.restart_check.outputs.required == 'false'
        run: |
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.HA_URL }}/api/services/homeassistant/reload_core_config"

      - name: Slack — Hot-reload complete
        if: steps.restart_check.outputs.required == 'false'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          body=$(jq -n \
            --arg msg ":white_check_mark: Config deployed from GitHub — automations, scripts, scenes, and templates reloaded. <${COMMIT_URL}|${SHORT_SHA}>" \
            --arg target "#deployment-feed" \
            '{"target": $target, "message": $msg, "data": {"username": "GitHub Actions", "icon": "rocket"}}')
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$body" \
            "${{ secrets.HA_URL }}/api/services/notify/make_nashville"

      # --- Post-deploy backup ---

      - name: Trigger nightly backup via SSH addon
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"addon": "core_ssh", "input": "bash /config/git_backup.sh"}' \
            "${{ secrets.HA_URL }}/api/services/hassio/addon_stdin"

      # --- Failure notification ---

      - name: Slack — Deploy failed
        if: failure()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(jq -n \
            --arg msg ":x: Deploy failed for <${COMMIT_URL}|${SHORT_SHA}>. <${RUN_URL}|View run>" \
            --arg target "#deployment-feed" \
            '{"target": $target, "message": $msg, "data": {"username": "GitHub Actions", "icon": "rotating_light"}}')
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$body" \
            "${{ secrets.HA_URL }}/api/services/notify/make_nashville"
